set noparent
linelength=100
# Filter rules:
#   -whitespace/indent_namespace : we use NamespaceIndentation: None (flat namespaces).
# Intentionally left enabled (cpplint defaults):
#   +readability/casting : flags C-style casts of builtin types (int, float, ...);
#                          does NOT catch qualified types like (cute::bfloat16_t)(x)
#                          -- those need reviewer attention or a future custom check.
#   +readability/braces  : flags if/else arms that mix braced and un-braced bodies.
filter=-whitespace/indent_namespace
