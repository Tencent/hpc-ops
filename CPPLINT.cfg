set noparent
linelength=100
# Filter rules:
#   -whitespace/indent_namespace : we use NamespaceIndentation: None (flat namespaces).
#   -build/include_order         : include ordering is owned by clang-format
#                                  (IncludeBlocks: Regroup + IncludeCategories in
#                                  .clang-format). cpplint's classifier is hard-coded
#                                  and treats any <*.h>-suffixed system header as a
#                                  C header -- including CUDA <*.cuh> -- which then
#                                  conflicts with how clang-format groups them with
#                                  C++ system headers, producing false positives like
#                                  "Found C system header after C++ system header".
#                                  clang-format is the single source of truth for
#                                  include ordering, so this rule is disabled.
# Intentionally left enabled (cpplint defaults):
#   +readability/casting : flags C-style casts of builtin types (int, float, ...);
#                          does NOT catch qualified types like (cute::bfloat16_t)(x)
#                          -- those need reviewer attention or a future custom check.
#   +readability/braces  : flags if/else arms that mix braced and un-braced bodies.
filter=-whitespace/indent_namespace,-build/include_order