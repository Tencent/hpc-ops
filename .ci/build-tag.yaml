version: v3.0
name: HPC-OPS-CICD-TAG
on:
  repo-name: HCF-Private/hpc-ops
  type: git
  tag:
    name: Git事件触发
    from-branches:
    - master
  manual: enabled
variables:
  BK_CI_HOOK_SOURCE_BRANCH:
    value: master
    props:
      label: branch
      type: vuex-input
stages:
- name: stage-1
  label:
  - Build
  jobs:
    job_Cty:
      name: torch290+cu129+sm90
      runs-on:
        pool-name: docker
        container:
          image: mirrors.tencent.com/hunyuan_infer/text2text_base:H-1.7.0
      steps:
      - checkout:
          repo-id: rxOYK
        name: git clone and checkout
        with:
          refName: "${BK_CI_HOOK_SOURCE_BRANCH}"
          enableGitLfs: false
      - name: compile sm90
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe
            cd ${{ci.workspace}}
            pip install build cmake
            make sm90
      - name: config pip for upload
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe
            cd ${{ci.workspace}}
            pip config set global.index-url https://bkdevops:@mirrors.tencent.com/repository/pypi/tencent_pypi/simple/
            pip config set global.extra-index-url https://bkdevops:@mirrors.tencent.com/pypi/simple/
            pip config set global.timeout 600
            pip config set install.trusted-host mirrors.tencent.com
      - name: upload to pypi
        uses: DistributionToGeneric@1.*
        with:
          username: reedlauliu
          token: e0b4892c66d411f086b85254009bad14
          repo_category: pypi
          pypi_upload_arguments:
          - skip_existing
          - verbose
          distribution: dist/hpc*.whl
        retry-times: 2
