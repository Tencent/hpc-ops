version: v3.0
name: HPC-OPS-CICD
on:
  repo-name: HCF-Private/hpc-ops
  type: git
  mr:
    name: Git事件触发
    target-branches:
    - master
    action:
    - open
    - reopen
    - push-update
    block-mr: true
    skip-wip: false
  manual: enabled
variables:
  BK_CI_HOOK_SOURCE_BRANCH:
    value: master
    props:
      label: branch
      type: vuex-input
  RUN_FULL_SANITIZER:
    value: "false"
    allow-modify-at-startup: true
    props:
      label: Run full compute-sanitizer
      type: selector
      options:
        - id: "true"
          description: "true"
        - id: "false"
          description: "false"
      description: "true = full, false = incremental, default false"
  TAIJI_API_TOKEN:
    value: VLkUmhaOkLQFiF2bJT-bWw
    const: true
    props:
      type: vuex-input
      description: Taiji OpenAPI token
  WSID:
    value: "12471"
    const: true
    props:
      type: vuex-input
      description: https://hunyuanaide.taiji.woa.com/web/home_new?wsId=12471
  BUSINESS_FLAG:
    value: TaiJi_HYAide_HCF_CICD_SZ_H20
    const: true
    props:
      type: vuex-input
      description: Taiji business flag (resource group)
  CICD_IMAGE:
    value: mirrors.tencent.com/hunyuan_infer/text2text_infer:H-5.2.1-v1
    const: true
    props:
      type: vuex-input
      description: Taiji GPU container image for stage-2 tests
  CI_POLL_INTERVAL:
    value: "60"
    const: true
    props:
      type: vuex-input
      description: Polling interval in seconds
  BKREPO_USER:
    value: reedlauliu
    const: true
    props:
      type: vuex-input
  BKREPO_TOKEN:
    value: 063d7d21ae494ce73636f0f767a15ec5
    const: true
    props:
      type: vuex-input
stages:
- name: stage-1
  label:
  - Build
  jobs:
    job_Pack:
      name: Pack and check source code
      runs-on:
        pool-name: docker
        hw-spec: Standard-M
        container:
          image: mirrors.tencent.com/hunyuan_infer/text2text_base:H-1.7.0
      steps:
      - checkout:
          repo-id: rxOYK
        name: git clone and checkout
        with:
          refName: "${BK_CI_HOOK_SOURCE_BRANCH}"
          enableGitLfs: false
      - name: code style check
        id: ""
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe
            cd ${{ci.workspace}}
            pip install black==25.9.0
            pip install cpplint==2.0.2
            pip install clang-format==21.1.2
            make format-check
      - name: character check
        id: N_0
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe
            cd ${{ci.workspace}}
            python3 tools/check-no-chinese.py
      - name: code.tar.gz
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe
            cd ${{ci.workspace}}
            tar -cvf code.tar.gz ./
            cat /sys/fs/cgroup/memory/memory.limit_in_bytes
      - name: upload-code.tar.gz
        id: ""
        uses: UploadArtifactory@8.*
        with:
          filePath: code.tar.gz
          downloadFiles: "[{\"path\":\"\",\"param\":\"\"}]"
          metadata: []
