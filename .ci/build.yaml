        uses: linuxScript@1.*
        with:
          script: |-
            set -xe

            cd ${{ci.workspace}}

            tar -cvf code.tar.gz ./
      - name: upload-code.tar.gz
        id: ""
        uses: UploadArtifactory@8.*
        with:
          filePath: code.tar.gz
          downloadFiles: "[{\"path\":\"\",\"param\":\"\"}]"
          metadata: []
      - name: complile whl
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe

            cd ${{ci.workspace}}

            make wheel

            python3 -m pip install twine
      - name: upload to pypi
        uses: DistributionToGeneric@1.*
        with:
          username: reedlauliu
          token: e0b4892c66d411f086b85254009bad14
          repo_category: pypi
          pypi_upload_arguments:
          - skip_existing
          - verbose
          distribution: dist/hpc*.whl
        retry-times: 2
