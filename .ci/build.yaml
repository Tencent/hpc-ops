            sudo docker exec -t hpc-ops-cicd bash -c "cd ${workpath}/ && tar -xvf ./code.tar.gz"
      - name: make
        uses: JobScriptExecutionA@1.*
        with:
          envId:
          - dpzbvgzp
          account: reedlauliu
          shellScriptContent: |-
            #!/bin/bash

            set -xe

            echo ${{BK_CI_PROJECT_NAME}}
            echo ${{BK_CI_PIPELINE_ID}}
            echo ${{BK_CI_BUILD_ID}}
            echo ${{BK_CI_BUILD_NUM}}
            echo ${{BK_CI_BUILD_TASK_ID}}

            workpath=/data/landun/workspace/${{BK_CI_PROJECT_NAME}}/${{BK_CI_PIPELINE_ID}}/${{BK_CI_BUILD_ID}}
            sudo docker exec -t hpc-ops-cicd bash -c "cd ${workpath}/ && export CMAKE_BUILD_PARALLEL_LEVEL=32 && make"
      - name: pytest
        id: yST
        uses: JobScriptExecutionA@1.*
        with:
          envId:
          - dpzbvgzp
          account: reedlauliu
          shellScriptContent: |-
            #!/bin/bash

            set -xe

            echo ${{BK_CI_PROJECT_NAME}}
            echo ${{BK_CI_PIPELINE_ID}}
            echo ${{BK_CI_BUILD_ID}}
            echo ${{BK_CI_BUILD_NUM}}
            echo ${{BK_CI_BUILD_TASK_ID}}

            workpath=/data/landun/workspace/${{BK_CI_PROJECT_NAME}}/${{BK_CI_PIPELINE_ID}}/${{BK_CI_BUILD_ID}}
            sudo docker exec -t hpc-ops-cicd bash -c "pkill -9 python3 || true"
            sudo docker exec -t hpc-ops-cicd bash -c "cd ${workpath}/ && export SKIP_MULTI_GPU=0 && make test"
      - name: compute-sanitizer (incremental)
        if: variables.RUN_FULL_SANITIZER == 'false'
        uses: JobScriptExecutionA@1.*
        with:
          envId:
          - dpzbvgzp
          scriptTimeout: "43200"
          account: reedlauliu
          shellScriptContent: |-
            #!/bin/bash
            set -xe

            echo ${{BK_CI_PROJECT_NAME}}
            echo ${{BK_CI_PIPELINE_ID}}
            echo ${{BK_CI_BUILD_ID}}
            echo ${{BK_CI_BUILD_NUM}}
            echo ${{BK_CI_BUILD_TASK_ID}}

            workpath=/data/landun/workspace/${{BK_CI_PROJECT_NAME}}/${{BK_CI_PIPELINE_ID}}/${{BK_CI_BUILD_ID}}
            sudo docker exec -t hpc-ops-cicd bash -c "pkill -9 python3 || true"
            sudo docker exec -t hpc-ops-cicd bash -c "cd ${workpath}/ && (git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git fetch origin master --depth=200 || true) && make sanitizer"
      - name: compute-sanitizer (full)
        if: variables.RUN_FULL_SANITIZER == 'true'
        uses: JobScriptExecutionA@1.*
        with:
          envId:
          - dpzbvgzp
          scriptTimeout: "43200"
          account: reedlauliu
          shellScriptContent: |-
            #!/bin/bash
            set -xe

            echo ${{BK_CI_PROJECT_NAME}}
            echo ${{BK_CI_PIPELINE_ID}}
            echo ${{BK_CI_BUILD_ID}}
            echo ${{BK_CI_BUILD_NUM}}
            echo ${{BK_CI_BUILD_TASK_ID}}

            workpath=/data/landun/workspace/${{BK_CI_PROJECT_NAME}}/${{BK_CI_PIPELINE_ID}}/${{BK_CI_BUILD_ID}}
            sudo docker exec -t hpc-ops-cicd bash -c "pkill -9 python3 || true"
            sudo docker exec -t hpc-ops-cicd bash -c "cd ${workpath}/ && make sanitizer-all"

finally:
  job_StopTaiji:
    name: stop taiji task
    runs-on:
      pool-name: docker
      hw-spec: Standard-S
      container:
        image-code: tlinux3_ci
        image-version: 2.*
    steps:
    - name: 停止任务
      id: stop
      if: ALWAYS
      continue-on-error: true
      run: |
        #!/bin/bash
        # Best-effort stop of the Taiji CI task.
        set -x
        _TASK_ID="${{jobs.job_4Xn.steps.start.outputs.TASK_ID}}"
        if [ -z "${_TASK_ID}" ] || [ "${_TASK_ID}" = "null" ]; then
          echo "INFO: no task_id, nothing to stop."
          exit 0
        fi
        RESPONSE=$(curl -sS -X POST "http://hunyuanaide.taiji.woa.com/taskmanagement/openapi/v1/task/${_TASK_ID}/stop" \
          -H "Content-Type: application/json" \
          -H "IPLUS-TASK-SERVER-API-TOKEN: ${{variables.TAIJI_API_TOKEN}}" \
          -H "WSID: ${{variables.WSID}}" \
          -d '{}') || true
        echo "Stop response: ${RESPONSE}"
      shell: bash
notices:
- if: FAILURE
  type:
  - email
  - wework-message
  receivers:
  - "${{ci.actor}}"
  content: "【${{ci.project_name}}】- 【${{ci.pipeline_name}}】#${{ci.build_num}} 执行失败，耗时${{ci.pipeline_execute_time}}, 触发人: ${{ci.actor}}。"
concurrency:
  queue-timeout-minutes: 10
syntax-dialect: INHERIT

