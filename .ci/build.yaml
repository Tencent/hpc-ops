        - linux
      steps:
      - checkout:
          repo-id: rxOYK
        name: git clone and checkout
        with:
          refName: "${BK_CI_HOOK_SOURCE_BRANCH}"
      - name: code style check
        id: ""
        uses: linuxScript@1.*
        with:
          script: |-
            set -xe

            cd ${{ci.workspace}}

            python3 -m pip -q install black

            make format-check
      - name: character check
